<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molekül-Labor Pro | 3D-Optimierung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>

    <style>
        .step-card { transition: all 0.3s ease; }
        .step-active { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .viewer-container { position: relative; width: 100%; height: 400px; background-color: #0f172a; border-radius: 1rem; overflow: hidden; }
        #jsme_container { border-radius: 1rem; overflow: hidden; border: 2px solid #cbd5e1; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900 pb-20">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <header class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-200 mb-8 flex items-center gap-6">
            <div class="bg-blue-900 p-4 rounded-3xl text-yellow-400 text-4xl shadow-lg">🧬</div>
            <div>
                <h1 class="text-4xl font-black text-blue-900 uppercase tracking-tighter italic">Molekül-Labor <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">2D Skizze ➔ Basis-3D (Kraftfeld) ➔ QM-Referenz</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <div class="lg:col-span-5 space-y-6">
                
                <div id="step1" class="step-card bg-white p-6 rounded-[2rem] shadow-lg border-2 border-blue-500 step-active">
                    <h2 class="text-xl font-black text-slate-800 uppercase mb-2">1. Molekül Zeichnen</h2>
                    <p class="text-xs text-slate-500 mb-4">Zeichne eine 2D-Struktur oder nutze die Vorlagen.</p>
                    <div id="jsme_container" class="w-full h-[300px] bg-slate-50"></div>
                    <div class="mt-4 flex gap-2">
                        <input type="text" id="smilesInput" class="flex-1 p-3 bg-slate-100 border border-slate-300 rounded-xl font-mono text-sm" placeholder="SMILES Code..." readonly>
                        <button onclick="getSmiles()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-blue-500 transition-colors">SMILES holen</button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2rem] shadow-lg border-b-[8px] border-blue-950 space-y-3">
                    <h3 class="text-blue-400 font-black uppercase text-sm mb-4 tracking-widest">Simulations-Pipeline</h3>
                    
                    <button id="btnMM" onclick="fetchBasic3D()" disabled class="w-full bg-slate-700 text-slate-300 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-left px-6 border border-slate-600">
                        ▶ 2. Basis-3D (NCI Cactus)
                    </button>
                    
                    <button id="btnRef" onclick="fetchQMReference()" disabled class="w-full bg-slate-700 text-slate-300 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all text-left px-6 border border-slate-600">
                        ▶ 3. QM-Referenz (PubChem)
                    </button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 h-full flex flex-col">
                    <div class="flex justify-between items-end mb-4">
                        <h2 class="text-2xl font-black text-blue-900 uppercase">3D-Visualisierung</h2>
                        <span id="viewLabel" class="bg-slate-200 text-slate-600 px-4 py-1 rounded-full font-bold text-xs uppercase tracking-widest">Kein Modell geladen</span>
                    </div>
                    
                    <div id="viewer3D" class="viewer-container flex-1 border-4 border-slate-900"></div>
                    
                    <div id="explanationBox" class="mt-6 p-5 bg-blue-50 border border-blue-200 rounded-2xl hidden">
                        <h4 class="font-black text-blue-800 uppercase text-sm mb-2" id="explTitle">Information</h4>
                        <p class="text-slate-600 text-sm" id="explText"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- GLOBALE VARIABLEN ---
        let jsmeApplet = null;
        let viewer = null;
        let currentSmiles = "";

        // --- 1. INITIALISIERUNG ---
        function jsmeOnLoad() {
            jsmeApplet = new JSApplet.JSME("jsme_container", "100%", "100%", {
                "options" : "query,nocanonize,hydrogens"
            });
        }

        window.onload = () => {
            let element = document.getElementById('viewer3D');
            viewer = $3Dmol.createViewer(element, { backgroundColor: '#0f172a' });
        };

        // --- 2. WORKFLOW LOGIK ---

        // Schritt 1: SMILES holen
        function getSmiles() {
            if (!jsmeApplet) return;
            currentSmiles = jsmeApplet.smiles();
            if (!currentSmiles) {
                alert("Bitte zeichne zuerst ein Molekül!");
                return;
            }
            document.getElementById('smilesInput').value = currentSmiles;
            
            // Buttons freischalten
            document.getElementById('btnMM').disabled = false;
            document.getElementById('btnRef').disabled = true;
            
            updateViewLabel("2D Struktur erfasst", "bg-slate-200", "text-slate-600");
            viewer.clear();
            viewer.render();
            hideExplanation();
            
            // Optisches Feedback
            document.getElementById('step1').classList.remove('border-blue-500', 'step-active');
            document.getElementById('step1').classList.add('border-transparent');
            document.getElementById('btnMM').classList.replace('bg-slate-700', 'bg-blue-600');
            document.getElementById('btnMM').classList.replace('text-slate-300', 'text-white');
        }

        // Schritt 2: Standard 3D (via NCI Cactus)
        async function fetchBasic3D() {
            if (!currentSmiles) return;
            
            updateViewLabel("Generiere 3D...", "bg-orange-200", "text-orange-800");
            
            try {
                const encodedSmiles = encodeURIComponent(currentSmiles);
                // NCI Cactus liefert schnelle, regelbasierte 3D Geometrien
                const url = `https://cactus.nci.nih.gov/chemical/structure/${encodedSmiles}/file?format=sdf&get3d=true`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Fehler bei der 3D-Generierung");
                
                const sdfData = await response.text();
                
                showInViewer(sdfData, "Stick");
                
                updateViewLabel("Basis 3D-Modell (NCI Cactus)", "bg-blue-200", "text-blue-800");
                showExplanation("Standard-Geometrie (Regelbasiert)", "Der Algorithmus hat die 2D-Zeichnung in den 3D-Raum übersetzt. Er nutzt Datenbank-Wissen und einfache Kraftfeld-Regeln (wie VSEPR), um Standard-Bindungslängen und Winkel zu erzeugen.");
                
                // Nächsten Button freischalten
                document.getElementById('btnRef').disabled = false;
                document.getElementById('btnMM').classList.replace('bg-blue-600', 'bg-slate-700');
                document.getElementById('btnMM').classList.replace('text-white', 'text-slate-300');
                document.getElementById('btnRef').classList.replace('bg-slate-700', 'bg-green-600');
                document.getElementById('btnRef').classList.replace('text-slate-300', 'text-white');

            } catch (e) {
                console.error(e);
                alert("NCI Cactus konnte dieses Molekül nicht verarbeiten.");
                updateViewLabel("Fehler", "bg-red-200", "text-red-800");
            }
        }

        // Schritt 3: QM Referenz (via PubChem)
        async function fetchQMReference() {
            if (!currentSmiles) return;
            
            updateViewLabel("Lade QM-Referenz...", "bg-yellow-200", "text-yellow-800");
            
            try {
                const encodedSmiles = encodeURIComponent(currentSmiles);
                // PubChem liefert mit MMFF94 + PM3 (Quantenmechanik) nachoptimierte Modelle
                const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${encodedSmiles}/SDF?record_type=3d`;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("PubChem hat keine 3D-Referenz");
                
                const sdfData = await response.text();
                
                showInViewer(sdfData, "Sphere");
                
                updateViewLabel("QM-Referenz (PubChem / PM3)", "bg-green-200", "text-green-800");
                showExplanation("Quantenmechanische Optimierung", "Dieses Modell stammt aus der Datenbank. Es wurde aufwändig mit semi-empirischer Quantenmechanik (PM3) nachoptimiert. Oft siehst du nur kleine Anpassungen im Vergleich zum Basis-Modell – das zeigt, wie gut einfache Regeln oft schon sind!");

            } catch (e) {
                console.error(e);
                alert("PubChem hat für dieses spezifische Molekül (noch) keine 3D-Struktur hinterlegt.");
                updateViewLabel("Referenz fehlt", "bg-red-200", "text-red-800");
            }
        }

        // --- 3. HELPER FUNKTIONEN ---
        function showInViewer(sdfData, styleType) {
            viewer.clear();
            viewer.addModel(sdfData, "sdf");
            
            if(styleType === "Stick") {
                // Typische "Stäbchen"-Darstellung
                viewer.setStyle({}, { stick: { radius: 0.15 }, sphere: { scale: 0.3 }});
            } else {
                // Auffälligere Darstellung für das End-Modell
                viewer.setStyle({}, { stick: { radius: 0.2 }, sphere: { scale: 0.4 }});
            }
            
            viewer.zoomTo();
            // Sanfte Drehung zur besseren 3D-Wahrnehmung
            viewer.spin("y", 1); 
            viewer.render();
        }

        function updateViewLabel(text, bgClass, textClass) {
            const lbl = document.getElementById('viewLabel');
            lbl.className = `${bgClass} ${textClass} px-4 py-1 rounded-full font-bold text-xs uppercase tracking-widest`;
            lbl.innerText = text;
        }

        function showExplanation(title, text) {
            const box = document.getElementById('explanationBox');
            document.getElementById('explTitle').innerText = title;
            document.getElementById('explText').innerText = text;
            box.classList.remove('hidden');
        }

        function hideExplanation() {
            document.getElementById('explanationBox').classList.add('hidden');
        }
    </script>
</body>
</html>
