<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Molekül-Labor Pro | 3D & Messung</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://3Dmol.csb.pitt.edu/build/3Dmol-min.js"></script>
    <script type="text/javascript" src="https://jsme-editor.github.io/dist/jsme/jsme.nocache.js"></script>

    <style>
        .step-active { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
        .viewer-container { position: relative; width: 100%; height: 400px; background-color: #0f172a; border-radius: 1rem; overflow: hidden; }
        #jsme_container { border-radius: 1rem; overflow: hidden; border: 2px solid #cbd5e1; }
        .mode-active { background-color: #3b82f6; color: white; font-weight: 900; border-color: #2563eb; }
        .mode-inactive { background-color: #f1f5f9; color: #64748b; font-weight: 700; border-color: #e2e8f0; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans text-slate-900 pb-20">

    <div class="max-w-7xl mx-auto px-4 py-6">
        <header class="bg-white p-6 rounded-[2rem] shadow-lg border border-slate-200 mb-8 flex items-center gap-6">
            <div class="bg-blue-900 p-4 rounded-3xl text-yellow-400 text-4xl shadow-lg">📐</div>
            <div>
                <h1 class="text-4xl font-black text-blue-900 uppercase tracking-tighter italic">Molekül-Labor <span class="text-blue-600">Pro</span></h1>
                <p class="text-slate-500 font-bold uppercase tracking-widest text-sm">3D-Strukturen & Interaktive Messung</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-5 space-y-6">
                <div id="step1" class="bg-white p-6 rounded-[2rem] shadow-lg border-2 border-blue-500 step-active">
                    <h2 class="text-xl font-black text-slate-800 uppercase mb-2">1. Molekül Zeichnen</h2>
                    <div id="jsme_container" class="w-full h-[300px] bg-slate-50"></div>
                    <div class="mt-4 flex gap-2">
                        <button onclick="clean2D()" title="2D Struktur aufräumen" class="bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold hover:bg-slate-300 text-xl">🧹</button>
                        <input type="text" id="smilesInput" class="flex-1 p-3 bg-slate-100 border border-slate-300 rounded-xl font-mono text-xs" readonly>
                        <button onclick="getSmiles()" class="bg-blue-600 text-white px-4 py-3 rounded-xl font-bold hover:bg-blue-500 uppercase text-xs">Start</button>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-[2rem] shadow-lg border-b-[8px] border-blue-950 space-y-3">
                    <h3 class="text-blue-400 font-black uppercase text-sm mb-4">Pipeline</h3>
                    <button id="btnMM" onclick="fetchBasic3D()" disabled class="w-full bg-slate-700 text-slate-300 py-4 rounded-xl font-black uppercase text-left px-6 border border-slate-600">▶ 2. Basis-3D (Kraftfeld)</button>
                    <button id="btnRef" onclick="fetchQMReference()" disabled class="w-full bg-slate-700 text-slate-300 py-4 rounded-xl font-black uppercase text-left px-6 border border-slate-600">▶ 3. QM-Referenz</button>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="bg-white p-6 rounded-[2rem] shadow-xl border border-slate-200 h-full flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-black text-blue-900 uppercase">3D-Visualisierung</h2>
                        <div id="modelToggleGroup" class="hidden flex bg-slate-100 rounded-xl border border-slate-200 overflow-hidden">
                            <button onclick="setDisplayMode('basic')" id="tglBasic" class="mode-toggle-btn mode-active px-3 py-2 text-xs uppercase">Basis</button>
                            <button onclick="setDisplayMode('ref')" id="tglRef" class="mode-toggle-btn mode-inactive px-3 py-2 text-xs uppercase">QM-Ref</button>
                            <button onclick="setDisplayMode('overlay')" id="tglOverlay" class="mode-toggle-btn mode-inactive px-3 py-2 text-xs uppercase">Overlay</button>
                        </div>
                    </div>
                    
                    <div id="viewer3D" class="viewer-container flex-1 border-4 border-slate-900"></div>
                    
                    <div class="mt-4 flex flex-wrap gap-4 items-center bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <select id="styleSelect" onchange="updateViewerStyle()" class="bg-white border border-slate-300 text-sm rounded-lg p-2 font-bold outline-none">
                            <option value="ballAndStick">Ball & Stick</option>
                            <option value="stick">Stäbchen</option>
                            <option value="sphere">Kalottenmodell</option>
                        </select>
                        
                        <div class="flex-1"></div>

                        <button id="btnMeasure" onclick="toggleMeasureMode()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-4 py-2 rounded-lg font-bold text-sm uppercase transition-colors">
                            📏 Messen: AUS
                        </button>
                        <button onclick="clearMeasurements()" class="bg-red-100 hover:bg-red-200 text-red-700 px-3 py-2 rounded-lg font-bold text-sm uppercase">🗑 Messungen löschen</button>
                    </div>
                    
                    <p id="measureHint" class="hidden text-xs text-blue-600 mt-2 font-bold text-center">Klicke auf 2 Atome für Abstand, auf 3 Atome für Winkel.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let jsmeApplet = null;
        let viewer = null;
        let currentSmiles = "";
        let basicSdf = ""; let refSdf = "";
        let currentDisplayMode = "basic";
        
        // Measurement Variables
        let measureMode = false;
        let clickedAtoms = [];
        let measurementLabels = [];

        function jsmeOnLoad() {
            jsmeApplet = new JSApplet.JSME("jsme_container", "100%", "100%", {"options" : "query,nocanonize,hydrogens"});
        }

        window.onload = () => {
            viewer = $3Dmol.createViewer(document.getElementById('viewer3D'), { backgroundColor: '#0f172a' });
        };

        function clean2D() { if (jsmeApplet && jsmeApplet.smiles()) jsmeApplet.readGenericMolecularInput(jsmeApplet.smiles()); }

        function getSmiles() {
            if (!jsmeApplet || !jsmeApplet.smiles()) return;
            currentSmiles = jsmeApplet.smiles();
            document.getElementById('smilesInput').value = currentSmiles;
            document.getElementById('btnMM').disabled = false;
            document.getElementById('btnRef').disabled = true;
            basicSdf = ""; refSdf = "";
            document.getElementById('modelToggleGroup').classList.add('hidden');
            viewer.clear(); viewer.render();
            clearMeasurements();
        }

        async function fetchBasic3D() {
            if (!currentSmiles) return;
            try {
                const url = `https://cactus.nci.nih.gov/chemical/structure/${encodeURIComponent(currentSmiles)}/file?format=sdf&get3d=true`;
                const response = await fetch(url);
                basicSdf = await response.text();
                currentDisplayMode = "basic";
                renderModels();
                document.getElementById('btnRef').disabled = false;
            } catch (e) { alert("NCI Cactus Fehler."); }
        }

        async function fetchQMReference() {
            if (!currentSmiles) return;
            try {
                const url = `https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${encodeURIComponent(currentSmiles)}/SDF?record_type=3d`;
                const response = await fetch(url);
                refSdf = await response.text();
                document.getElementById('modelToggleGroup').classList.remove('hidden');
                setDisplayMode('overlay');
            } catch (e) { alert("PubChem Fehler."); }
        }

        function setDisplayMode(mode) {
            currentDisplayMode = mode;
            ['basic', 'ref', 'overlay'].forEach(m => {
                document.getElementById('tgl' + m.charAt(0).toUpperCase() + m.slice(1)).className = 
                    m === mode ? "mode-toggle-btn mode-active px-3 py-2 text-xs uppercase" : "mode-toggle-btn mode-inactive px-3 py-2 text-xs uppercase";
            });
            renderModels();
            clearMeasurements(); // Wechsel löscht Messungen
        }

        function renderModels() {
            viewer.clear();
            const style = document.getElementById('styleSelect').value;
            let getStyle = (isRef) => {
                let c = (isRef && currentDisplayMode === 'overlay') ? 'cyanCarbon' : 'lightgreyCarbon';
                if(style === 'ballAndStick') return { stick: { radius: 0.15, colorscheme: c }, sphere: { scale: 0.3, colorscheme: c } };
                if(style === 'stick') return { stick: { radius: 0.25, colorscheme: c } };
                return { sphere: { scale: 1.0, colorscheme: c } };
            };

            if (basicSdf && (currentDisplayMode === 'basic' || currentDisplayMode === 'overlay')) {
                viewer.addModel(basicSdf, "sdf");
                viewer.setStyle({model: 0}, getStyle(false));
            }
            if (refSdf && (currentDisplayMode === 'ref' || currentDisplayMode === 'overlay')) {
                viewer.addModel(refSdf, "sdf");
                let mIdx = (currentDisplayMode === 'overlay' && basicSdf) ? 1 : 0;
                viewer.setStyle({model: mIdx}, getStyle(true));
            }
            viewer.zoomTo();
            viewer.render();
            setupMeasurementClick();
        }

        function updateViewerStyle() { renderModels(); }

        // --- MEASUREMENT LOGIC ---
        function toggleMeasureMode() {
            measureMode = !measureMode;
            const btn = document.getElementById('btnMeasure');
            const hint = document.getElementById('measureHint');
            
            if(measureMode) {
                btn.innerText = "📏 Messen: EIN";
                btn.classList.replace('bg-slate-200', 'bg-green-200');
                btn.classList.replace('text-slate-700', 'text-green-800');
                hint.classList.remove('hidden');
            } else {
                btn.innerText = "📏 Messen: AUS";
                btn.classList.replace('bg-green-200', 'bg-slate-200');
                btn.classList.replace('text-green-800', 'text-slate-700');
                hint.classList.add('hidden');
                clickedAtoms = [];
            }
            setupMeasurementClick();
        }

        function clearMeasurements() {
            clickedAtoms = [];
            measurementLabels.forEach(shape => viewer.removeShape(shape));
            measurementLabels = [];
            viewer.render();
        }

        function setupMeasurementClick() {
            viewer.setClickable({}, measureMode, function(atom, viewer, event, container) {
                if(!measureMode) return;
                
                clickedAtoms.push(atom);
                
                // Highlight clicked atom
                let sphere = viewer.addSphere({ center: {x: atom.x, y: atom.y, z: atom.z}, radius: 0.4, color: 'yellow', alpha: 0.6 });
                measurementLabels.push(sphere);
                viewer.render();

                if (clickedAtoms.length === 2) {
                    // Distance
                    let a1 = clickedAtoms[0], a2 = clickedAtoms[1];
                    let dist = Math.sqrt(Math.pow(a2.x-a1.x, 2) + Math.pow(a2.y-a1.y, 2) + Math.pow(a2.z-a1.z, 2));
                    
                    let line = viewer.addCylinder({ start: {x:a1.x, y:a1.y, z:a1.z}, end: {x:a2.x, y:a2.y, z:a2.z}, radius: 0.05, color: 'yellow', dashed: true });
                    let label = viewer.addLabel(dist.toFixed(2) + " Å", { position: {x: (a1.x+a2.x)/2, y: (a1.y+a2.y)/2, z: (a1.z+a2.z)/2}, backgroundColor: 'black', backgroundOpacity: 0.8, fontColor: 'yellow' });
                    
                    measurementLabels.push(line, label);
                    viewer.render();
                } 
                else if (clickedAtoms.length === 3) {
                    // Angle
                    let a1 = clickedAtoms[0], a2 = clickedAtoms[1], a3 = clickedAtoms[2];
                    
                    let v1 = {x: a1.x-a2.x, y: a1.y-a2.y, z: a1.z-a2.z};
                    let v2 = {x: a3.x-a2.x, y: a3.y-a2.y, z: a3.z-a2.z};
                    
                    let dot = v1.x*v2.x + v1.y*v2.y + v1.z*v2.z;
                    let mag1 = Math.sqrt(v1.x*v1.x + v1.y*v1.y + v1.z*v1.z);
                    let mag2 = Math.sqrt(v2.x*v2.x + v2.y*v2.y + v2.z*v2.z);
                    let angle = Math.acos(dot / (mag1 * mag2)) * (180 / Math.PI);
                    
                    let line = viewer.addCylinder({ start: {x:a2.x, y:a2.y, z:a2.z}, end: {x:a3.x, y:a3.y, z:a3.z}, radius: 0.05, color: 'yellow', dashed: true });
                    let label = viewer.addLabel(angle.toFixed(1) + "°", { position: {x: a2.x, y: a2.y+0.5, z: a2.z}, backgroundColor: 'black', backgroundOpacity: 0.8, fontColor: 'yellow' });
                    
                    measurementLabels.push(line, label);
                    clickedAtoms = []; // Reset nach Winkel
                    viewer.render();
                }
            });
        }
    </script>
</body>
</html>
